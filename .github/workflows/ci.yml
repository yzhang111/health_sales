name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m venv .venv313
          source .venv313/bin/activate
          pip install -r requirements.txt

      - name: Compile check
        run: |
          source .venv313/bin/activate
          python -m compileall app

      - name: Run tests
        run: |
          source .venv313/bin/activate
          pytest -q
